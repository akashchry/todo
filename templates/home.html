{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO LIST - Home</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" 
          rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        /* Scroll area */
        .task-scroll {
            height: 450px;
            overflow-y: auto;
        }

        /* Card styling */
        .task-card {
            border-radius: 10px;
            transition: 0.3s;
        }

        .task-card:hover {
            background-color: #f8f9fa;
        }

        /* Flex layout for task */
        .task-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Button spacing */
        .task-actions a {
            margin-left: 5px;
        }

        /* Completed task style */
        .completed-card {
            background: #f8f9fa;
        }

    </style>
</head>

<body>
    <div class="container">
        <h3 class="pt-5 text-center">Django ToDo App</h3>

        <div class="row mt-4">
            <!-- LEFT SIDE (ACTIVE TASKS) -->
            <div class="col-md-7 col-lg-7">
                <h4>My Day</h4>
                <p class="text-muted">{% now "jS F Y" %}</p>

                <div class="task-scroll">
                    {% for task in tasks %}
                    <div class="card task-card mb-2">
                        <div class="card-body task-content">
                            
                            <!-- Task Text -->
                            <span>{{ task.task }}</span>

                            <!-- Buttons -->
                            <div class="task-actions">
                                <a href="{% url 'mark_as_done' task.pk %}" class="btn btn-success btn-sm">
                                    <i class="fa fa-check"></i> Done
                                </a>
                                <a href="{% url 'delete_task' task.pk %}" class="btn btn-danger btn-sm">
                                    <i class="fa fa-trash"></i>
                                </a>
                                <a href="{% url 'edit_task' task.pk %}" class="btn btn-primary btn-sm">
                                    <i class="fa fa-pencil"></i>
                                </a>
                            </div>

                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <!-- RIGHT SIDE (COMPLETED TASKS) -->
            <div class="col-md-5 col-lg-5">
                <h5>Completed Tasks</h5>

                {% for task in completed_tasks %}
                <div class="card completed-card mb-2">
                    <div class="card-body task-content">

                        <!-- Task Text -->
                        <span>{{ task.task }}</span>

                        <!-- Undo Button -->
                        <div class="task-actions">
                            <a href="{% url 'mark_as_undone' task.pk %}" class="btn btn-danger btn-sm">
                                <i class="fa fa-times"></i> Undo
                            </a>
                        </div>

                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- ADD TASK FORM -->
        <div class="row mt-4">
            <div class="col-md-7 col-lg-7">
                <form action="{% url 'addTask' %}" method="POST">
                    {% csrf_token %}
                    <div style="display: flex; gap: 10px;">
                        <input type="text" name="task" class="form-control" placeholder="Add a task" required>
                        <button type="submit" class="btn btn-primary">Add</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
