{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Task</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-control, .form-select {
            border-radius: 8px;
        }

        .btn {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4">

                <h3 class="text-center mb-4">
                    ✏ Edit Task
                </h3>

                <form action="{% url 'edit_task' task.pk %}" method="POST">
                    {% csrf_token %}

                    <!-- TASK NAME -->
                    <div class="mb-3">
                        <label class="form-label">📝 Task</label>
                        <input type="text" name="task" class="form-control"
                               value="{{ task.task }}" required>
                    </div>

                    <!-- PRIORITY -->
                    <div class="mb-3">
                        <label class="form-label">🎯 Priority</label>
                        <select name="priority" class="form-select">

                            <option value="Low" {% if task.priority == "Low" %}selected{% endif %}>
                                🟢 Low
                            </option>

                            <option value="Medium" {% if task.priority == "Medium" %}selected{% endif %}>
                                🟡 Medium
                            </option>

                            <option value="High" {% if task.priority == "High" %}selected{% endif %}>
                                🔴 High
                            </option>

                        </select>
                    </div>

                    <!-- DUE DATE -->
                    <div class="mb-3">
                        <label class="form-label">📅 Due Date</label>
                        <input type="date" name="due_date"
                               class="form-control"
                               value="{{ task.due_date|date:'Y-m-d' }}">
                    </div>

                    <!-- BUTTONS -->
                    <div class="d-flex justify-content-between">

                        <a href="{% url 'home' %}" class="btn btn-secondary">
                            ⬅ Back
                        </a>

                        <button type="submit" class="btn btn-primary">
                            💾 Update Task
                        </button>

                    </div>

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
