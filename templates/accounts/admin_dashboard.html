<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Admin Dashboard</h2>

    <div class="row">
        <div class="col-md-6">
            <div class="card p-3 text-center">
                <h5>Total Users</h5>
                <h2>{{ users.count }}</h2>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 text-center">
                <h5>Total Tasks</h5>
                <h2>{{ tasks.count }}</h2>
            </div>
        </div>
    </div>

    <h4 class="mt-4">Users</h4>
    <table class="table">
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
        </tr>
        {% endfor %}
    </table>

    <h4>Tasks</h4>
    <table class="table">
        {% for task in tasks %}
        <tr>
            <td>{{ task.task }}</td>
            <td>{{ task.user.username }}</td>
            <td>{{ task.priority }}</td>
            <td>{{ task.due_date }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/logout/" class="btn btn-danger">Logout</a>

</div>

</body>
</html>
